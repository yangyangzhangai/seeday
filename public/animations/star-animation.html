<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星动画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .scene {
    width: 600px;
    height: 300px;
    position: relative;
    overflow: hidden;
  }
  /* Single-shot playback: prevent loop reset flash at center */
  .scene *,
  .scene *::before,
  .scene *::after {
    animation-iteration-count: 1 !important;
    animation-fill-mode: forwards !important;
  }

  .star-xy {
    position: absolute;
    left: 50%; top: 50%;
    width: 0; height: 0;
    will-change: transform;
    animation: move-xy 2.2s cubic-bezier(0.4, 0, 0.15, 1) infinite;
  }
  @keyframes move-xy {
    0%   { transform: translate(0px, 0px); }
    45%  { transform: translate(0px, 0px); }
    100% { transform: translate(480px, -180px); }
  }

  .star-inner {
    position: absolute;
    width: 70px; height: 70px;
    margin: -35px;
    will-change: transform, opacity;
    animation: scale-in 2.2s ease-out infinite;
    filter: drop-shadow(0 0 14px rgba(255,220,60,1)) drop-shadow(0 0 40px rgba(255,200,40,0.7));
    z-index: 10;
  }
  .star-inner img { width: 100%; height: 100%; object-fit: contain; }

  @keyframes scale-in {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    10%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
    18%  { transform: scale(0.95) rotate(0deg); opacity: 1; }
    25%  { transform: scale(1.03) rotate(1deg); opacity: 1; }
    45%  { transform: scale(1) rotate(0deg); opacity: 1; }
    70%  { transform: scale(0.88) rotate(-6deg); opacity: 1; }
    87%  { transform: scale(0.5) rotate(-16deg); opacity: 0.4; }
    100% { transform: scale(0.2) rotate(-26deg); opacity: 0; }
  }

  /* Trail wrap — rotated along trajectory (backward = 159deg) */
  .trail-wrap {
    position: absolute;
    left: 0; top: 0;
    transform: rotate(159deg);
    transform-origin: 0 0;
    opacity: 0;
    animation: trail-fade 2.2s ease-out infinite;
  }
  @keyframes trail-fade {
    0%,44% { opacity: 0; }
    52%    { opacity: 1; }
    80%    { opacity: 0.85; }
    100%   { opacity: 0; }
  }

  .trail-glow {
    position: absolute;
    left: 4px; top: var(--top);
    width: var(--w); height: var(--h);
    border-radius: 99px;
    background: radial-gradient(ellipse at left center, var(--color) 0%, transparent 70%);
    filter: blur(var(--blur));
    opacity: var(--op);
    animation: trail-grow 2.2s ease-out infinite;
    animation-delay: var(--delay);
  }
  .trail-core {
    position: absolute;
    left: 4px; top: var(--top);
    width: var(--w); height: var(--h);
    border-radius: 99px;
    background: linear-gradient(to right, white 0%, var(--color) 30%, transparent 100%);
    opacity: var(--op);
    animation: trail-grow 2.2s ease-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes trail-grow {
    0%,44% { width: 0; opacity: 0; }
    53%    { width: var(--w); opacity: var(--op); }
    80%    { width: var(--w); opacity: var(--op); }
    100%   { width: var(--w); opacity: 0; }
  }

  /* Floating dust */
  .dust {
    position: absolute;
    width: var(--sz); height: var(--sz);
    border-radius: 50%;
    background: var(--color);
    filter: blur(var(--blur));
    opacity: 0;
    left: 0; top: 0;
    animation: dust-drift 2.2s ease-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes dust-drift {
    0%,44% { opacity: 0; transform: translate(var(--ox), var(--oy)) scale(0); }
    52%    { opacity: var(--op); transform: translate(var(--ox), var(--oy)) scale(1); }
    78%    { opacity: calc(var(--op)*0.6); transform: translate(calc(var(--ox)+var(--dx)), calc(var(--oy)+var(--dy))) scale(0.5); }
    100%   { opacity: 0; transform: translate(calc(var(--ox)+var(--dx)*1.6), calc(var(--oy)+var(--dy)*1.6)) scale(0); }
  }

  /* ✨ Twinkle: 4-point star shape that flickers on/off near trail */
  .twinkle {
    position: absolute;
    width: var(--sz); height: var(--sz);
    left: var(--tx); top: var(--ty);
    opacity: 0;
    animation:
      twinkle-appear 2.2s ease-out infinite,
      twinkle-blink var(--blink) ease-in-out var(--bdelay) infinite;
  }
  .twinkle::before,
  .twinkle::after {
    content: '';
    position: absolute;
    background: var(--color);
    border-radius: 99px;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    filter: blur(0.5px);
  }
  .twinkle::before {
    width: 100%; height: calc(var(--sz) * 0.18);
  }
  .twinkle::after {
    width: calc(var(--sz) * 0.18); height: 100%;
  }

  @keyframes twinkle-appear {
    0%,45%  { opacity: 0; transform: scale(0); }
    54%     { opacity: 1; transform: scale(1); }
    82%     { opacity: 0.9; transform: scale(0.9); }
    100%    { opacity: 0; transform: scale(0); }
  }
  @keyframes twinkle-blink {
    0%,100% { filter: brightness(1) drop-shadow(0 0 3px var(--color)); }
    50%     { filter: brightness(2) drop-shadow(0 0 8px white); }
  }

  /* Scatter sparkle dot — tiny, rapid flicker */
  .glint {
    position: absolute;
    width: var(--sz); height: var(--sz);
    border-radius: 50%;
    background: var(--color);
    box-shadow: 0 0 4px 1px var(--color);
    left: var(--tx); top: var(--ty);
    opacity: 0;
    animation: glint-flash 2.2s ease-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes glint-flash {
    0%,48%            { opacity: 0; transform: scale(0); }
    52%               { opacity: 1; transform: scale(1.4); }
    56%               { opacity: 0.2; transform: scale(0.6); }
    60%               { opacity: 1; transform: scale(1.2); }
    64%               { opacity: 0.3; transform: scale(0.7); }
    68%               { opacity: 0.9; transform: scale(1); }
    82%               { opacity: 0.5; transform: scale(0.8); }
    92%               { opacity: 0; transform: scale(0); }
    100%              { opacity: 0; }
  }
</style>
</head>

    <!-- ✨ 4-point twinkle stars scattered around trail -->
